# Pass/fail thresholds per evaluator (scores below these = fail)
quality:
  coherence: 3.0
  fluency: 3.0
  relevance: 3.0
  groundedness: 3.0
  similarity: 3.0
  response_completeness: 3.0
  retrieval: 3.0

safety:
  violence: 0        # 0 = safe, severity levels 0-7
  sexual: 0
  self_harm: 0
  hate_unfairness: 0

agentic:
  intent_resolution: 3.0
  tool_call_accuracy: 3.0
  task_adherence: 3.0

nlp:
  f1: 0.5
  bleu: 0.3
  rouge: 0.4
  meteor: 0.4

custom:
  tone_score: 3.0
  domain_accuracy_score: 0.7
  format_score: 0.8
