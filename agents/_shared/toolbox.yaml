# Foundry Toolbox definition for Cosmopilot (declare tools ONCE).
#
# Registering this toolbox in your Foundry project produces a single MCP
# endpoint (TOOLBOX_ENDPOINT) that every agent — hosted, multi-agent, prompt,
# and workflow — can share. Update the default version and all agents pick up
# the change without redeploying.
#
# Create/attach via the Foundry Toolkit (VS Code) or Foundry Portal (preferred),
# or the imperative `azd ai toolbox` CLI. See README.md in this folder.

name: cosmopilot-tools
description: >
  Shared Cosmopilot agent tools: Cosmos DB queries + change-feed access (via the
  cosmos-mcp server) and sandboxed code execution.

tools:
  # Recommended once a toolbox grows past ~5 tools: swaps the full tools/list for
  # tool_search + call_tool meta-tools so model context cost stays flat.
  - type: toolbox_search_preview

  # Sandboxed Python execution (built-in; no connection required).
  - type: code_interpreter

  # query_cosmos_db + get_change_feed_events, served by cosmos_mcp_server.py.
  # `project_connection_id` must reference a remoteTool connection that points at
  # the deployed cosmos-mcp endpoint (create it in the Foundry Portal / Toolkit).
  - type: mcp
    server_label: cosmos
    server_url: ${COSMOS_MCP_SERVER_URL}
    require_approval: never
    project_connection_id: cosmos-mcp-conn
