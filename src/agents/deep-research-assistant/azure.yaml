# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: deep-research-assistant

# Hosted LangGraph agent surfaced on Foundry over the Responses protocol.
# Deploy with the Azure Developer CLI Foundry extension:
#   azd ext install azure.ai.agents
#   azd auth login
#   azd ai agent init   # or wire this file into an existing hosted-agent project
#   azd provision       # if the project/model don't exist yet
#   azd deploy
#
# FOUNDRY_PROJECT_ENDPOINT is injected by Foundry at runtime — do NOT set it here.

services:
  ai-project:
    host: azure.ai.project
    # Connect to the existing Cosmopilot project (omit `deployments` so azd
    # won't try to (re)provision the model). Replace with your endpoint or set
    #   azd env set AZURE_AI_PROJECT_ENDPOINT <endpoint>
    endpoint: ${AZURE_AI_PROJECT_ENDPOINT}

  agent-tools:
    host: azure.ai.toolbox
    uses:
      - ai-project
    description: Foundry built-in web search for grounded research.
    tools:
      - type: web_search

  deep-research-assistant:
    host: azure.ai.agent
    project: .
    language: docker
    kind: hosted
    name: deep-research-assistant
    description: Iterative deep-research agent (LangGraph) with plan/search/reflect/synthesize.
    uses:
      - ai-project
      - agent-tools
    toolboxes:
      - agent-tools
    protocols:
      - protocol: responses
        version: 2.0.0
    env:
      AZURE_AI_MODEL_DEPLOYMENT_NAME: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
    startupCommand: python deep_research_agent.py
    container:
      resources:
        cpu: "0.5"
        memory: 1.0Gi
